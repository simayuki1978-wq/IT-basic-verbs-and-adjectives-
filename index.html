    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: var(--bg); color: var(--text);
        margin: 0; padding: 0; min-height: 100vh;
        transition: background 0.3s, color 0.3s;
    }

    nav {
        padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
        background: var(--card); border-bottom: 2px solid var(--border);

    .btn-home {
        padding: 8px 15px; border-radius: 12px; border: 2px solid var(--border);
        background: none; color: var(--text); font-size: 12px; font-weight: 700; cursor: pointer;
    }

    .screen { display: none; width: 100%; min-height: calc(100vh - 60px); flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
    .screen.active { display: flex; }

    .menu-title { font-size: 1.6rem; font-weight: 900; color: var(--blue); margin: 30px 0; text-align: center; line-height: 1.2; }

    .btn-menu {
        width: 100%; max-width: 320px; padding: 25px; margin: 12px 0;
        background: var(--card); border: 2px solid var(--border); border-bottom: 6px solid var(--border);
        border-radius: 20px; font-size: 1.2rem; font-weight: 800; color: var(--text); cursor: pointer;
    }
    .btn-menu:active { transform: translateY(3px); border-bottom-width: 2px; }
    .btn-menu:disabled { opacity: 0.5; cursor: not-allowed; }

</head>
<body>

<nav>
    <!-- [修正2] location.reload() → showScreen() で画面遷移のみ -->
    <button class="btn-home" onclick="goHome()">← HOME</button>
    <div id="status" style="font-size: 10px; font-weight: 900;">LOADING...</div>
    <!-- [修正3] data-theme を html に設定 -->
    <button class="btn-home" onclick="toggleDark()">🌙 DARK</button>
</nav>

<!-- トップ画面 -->

<div id="scr-top" class="screen active">
    <h1 class="menu-title">IT JAPANESE<br>LEARNING</h1>
    <div id="error-banner" class="error-banner">⚠️ データの読み込みに失敗しました。URLを確認してください。</div>
    <button class="btn-menu c-basic" id="btn-basic" onclick="startMode('basic')" disabled>基本動詞100 (読込中...)</button>
    <button class="btn-menu c-it-v"  id="btn-itv"   onclick="startMode('itv')"   disabled>IT動詞100 (読込中...)</button>
    <button class="btn-menu c-it-a"  id="btn-ita"   onclick="startMode('ita')"   disabled>IT形容詞 (読込中...)</button>
</div>

<!-- カード画面 -->

<div id="scr-card" class="screen">
    <div class="card">
        <div onclick="speak()" style="cursor:pointer; font-size: 2.5rem; margin-bottom: 15px;" title="発音を聞く">🔊</div>
        <div class="card-yomi"  id="c-yomi">--</div>
        <h2 class="card-kanji" id="c-kanji">--</h2>
        <div class="card-eng"   id="c-eng">--</div>
        <div class="example-box">
            <div class="example-label">Example Sentence</div>
            <div class="example-text" id="c-ex">--</div>
        </div>
    </div>
    <div class="controls">
        <button class="btn-ctrl" onclick="prev()" id="btn-prev">← PREV</button>
        <button class="btn-ctrl" onclick="next()" id="btn-next">NEXT →</button>
    </div>
    <div id="counter">0 / 0</div>
</div>

<script>
    // ===== データURL =====
    const URLS = {
        basic: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=979504695&single=true&output=csv',
        itv:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1703691449&single=true&output=csv',
        ita:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=2089928581&single=true&output=csv'
    };

    const dataStore = { basic: [], itv: [], ita: [] };
    let currentMode  = '';
    let currentList  = [];
    let currentIndex = 0;
    let currentVoice = ''; // [修正5] window汚染をやめて let で宣言

    // ===== [修正1] RFC4180準拠のCSVパーサー =====
    function parseCSV(text) {
        const rows = [];
        let row = [], cell = '', inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const ch   = text[i];
            const next = text[i + 1];

            if (inQuotes) {
                if (ch === '"' && next === '"') { cell += '"'; i++; }   // "" → "
                else if (ch === '"')             { inQuotes = false; }   // 引用符終了
                else                             { cell += ch; }
            } else {
                if      (ch === '"')  { inQuotes = true; }
                else if (ch === ',')  { row.push(cell.trim()); cell = ''; }
                else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                    if (ch === '\r') i++;
                    row.push(cell.trim()); cell = '';
                    if (row.some(c => c !== '')) rows.push(row);
                    row = [];
                } else if (ch === '\r') {
                    row.push(cell.trim()); cell = '';
                    if (row.some(c => c !== '')) rows.push(row);
                    row = [];
                } else { cell += ch; }
            }
        }
        // 最終行
        if (cell !== '' || row.length > 0) {
            row.push(cell.trim());
            if (row.some(c => c !== '')) rows.push(row);
        }
        return rows;
    }

    async function loadCSV(url) {
        // キャッシュ回避のタイムスタンプを付与
        const res = await fetch(url + '&v=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const rows = parseCSV(text);
        return rows.slice(1).filter(r => r[0]); // ヘッダー除去・空行除去
    }

    // ===== [修正6] Promise.all で並列フェッチ（高速化）=====
    async function init() {
        try {
            const [basic, itv, ita] = await Promise.all([
                loadCSV(URLS.basic),
                loadCSV(URLS.itv),
                loadCSV(URLS.ita)
            ]);
            dataStore.basic = basic;
            dataStore.itv   = itv;
            dataStore.ita   = ita;

            updateBtn('btn-basic', `基本動詞100 (${basic.length}件)`);
            updateBtn('btn-itv',   `IT動詞100 (${itv.length}件)`);
            updateBtn('btn-ita',   `IT形容詞 (${ita.length}件)`);
            document.getElementById('status').innerText = '✅ SYNCED';

        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = '❌ ERROR';
            document.getElementById('error-banner').style.display = 'block';
        }
    }

    function updateBtn(id, text) {
        const b = document.getElementById(id);
        b.disabled  = false;
        b.innerText = text;
    }

    // ===== [修正2] HOMEボタンはリロードせず画面遷移のみ =====
    function goHome() {
        document.getElementById('scr-card').classList.remove('active');
        document.getElementById('scr-top').classList.add('active');
    }

    // ===== [修正3] ダークモードを html 要素で管理 =====
    function toggleDark() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }

    // ===== モード開始 =====
    function startMode(mode) {
        currentMode  = mode;
        currentList  = dataStore[mode];
        currentIndex = 0; // [修正4] 常に先頭から開始（意図が明確）

        if (currentList.length === 0) return;

        updateCard();
        document.getElementById('scr-top').classList.remove('active');
        document.getElementById('scr-card').classList.add('active');
    }

    function updateCard() {
        const d = currentList[currentIndex];
        if (!d) return;

        // 列: 日本語(0), ひらがな(1), 英語(2), 例文(3)
        document.getElementById('c-kanji').innerText = d[0] || '--';
        document.getElementById('c-yomi').innerText  = d[1] || '--';
        document.getElementById('c-eng').innerText   = d[2] || '--';
        document.getElementById('c-ex').innerText    = d[3] || '例文はありません。';
        document.getElementById('counter').innerText = `${currentIndex + 1} / ${currentList.length}`;

        currentVoice = d[1] || ''; // [修正5] グローバル汚染なし

        // ボタンの活性/非活性を更新
        document.getElementById('btn-prev').disabled = currentIndex === 0;
        document.getElementById('btn-next').disabled = currentIndex === currentList.length - 1;
    }

    function next() {
        if (currentIndex < currentList.length - 1) { currentIndex++; updateCard(); }
    }
    function prev() {
        if (currentIndex > 0) { currentIndex--; updateCard(); }
    }

    // ===== [修正7] キーボード操作対応 =====
    document.addEventListener('keydown', (e) => {
        if (!document.getElementById('scr-card').classList.contains('active')) return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
        if (e.key === ' ') { e.preventDefault(); speak(); }
    });

    // ===== 音声再生 =====
    function speak() {
        if (!currentVoice) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentVoice);
        u.lang = 'ja-JP';
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    // ===== 起動 =====
    init();
</script>

</body>
</html>
